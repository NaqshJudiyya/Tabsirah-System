<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعبئة الاستمارة — تبصرة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <!-- مكتبة تحويل HTML إلى Canvas لإنشاء بطاقة المشاركة -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- بوابة المصادقة السريعة (تظهر إذا لم يكن المستخدم مسجل الدخول) -->
  <div id="auth-gateway" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
      <i class="fas fa-clipboard-check text-blue-600 text-5xl mb-4"></i>
      <h2 class="text-2xl font-bold mb-2" style="font-family: var(--font-heading);">مرحباً بك</h2>
      <p class="text-slate-500 mb-6">الرجاء إدخال بياناتك للمتابعة أو الدخول كضيف</p>
      
      <div class="space-y-3 text-right">
        <input type="text" id="gw-name" placeholder="الاسم الكامل" class="w-full px-4 py-2 border rounded-lg">
        <input type="email" id="gw-email" placeholder="البريد الإلكتروني" class="w-full px-4 py-2 border rounded-lg">
        <input type="password" id="gw-password" placeholder="كلمة المرور (للتسجيل)" class="w-full px-4 py-2 border rounded-lg">
      </div>

      <div class="mt-6 space-y-2">
        <button id="btn-gw-register" class="btn-primary w-full">تسجيل ومتابعة</button>
        <button id="btn-gw-guest" class="w-full bg-slate-100 text-slate-600 font-semibold py-2 rounded-lg hover:bg-slate-200 transition text-sm">
          المتابعة كضيف مجهول
        </button>
        <button id="btn-gw-login-google" class="w-full bg-white border text-slate-700 font-semibold py-2 rounded-lg hover:bg-slate-50 transition text-sm">
          <i class="fab fa-google ml-1 text-red-500"></i> الدخول بحساب جوجل
        </button>
      </div>
      <div id="gw-error" class="text-red-500 text-sm mt-3 hidden"></div>
    </div>
  </div>

  <!-- المحتوى الرئيسي للاستمارة -->
  <div class="max-w-3xl mx-auto p-4 md:p-8">
    
    <!-- رأس الاستمارة وشريط التقدم -->
    <header class="mb-8">
      <div class="flex justify-between items-center mb-2">
        <h1 id="form-title-display" class="text-3xl font-extrabold text-slate-800" style="font-family: var(--font-heading);">جاري التحميل...</h1>
        <span id="progress-text" class="text-sm font-bold text-blue-600">0%</span>
      </div>
      <p id="form-desc-display" class="text-slate-500 mb-4"></p>
      <div class="progress-bar-container w-full">
        <div id="progress-bar" class="progress-bar-fill" style="width: 0%;"></div>
      </div>
    </header>

    <!-- حاوية الأسئلة الديناميكية -->
    <form id="dynamic-form" class="space-y-6"></form>

    <!-- زر الإرسال -->
    <div id="submit-section" class="mt-8 text-center hidden">
      <button type="button" id="btn-submit-form" class="btn-primary text-lg px-10 py-3 rounded-xl shadow-lg hover:shadow-xl transition">
        <i class="fas fa-paper-plane ml-2"></i>إرسال الاستمارة
      </button>
    </div>

    <!-- قسم النتيجة (يظهر بعد الإرسال) -->
    <div id="result-section" class="hidden mt-8 text-center bg-white p-8 rounded-2xl shadow-lg">
      <h2 class="text-2xl font-bold text-slate-800 mb-4" style="font-family: var(--font-heading);">تم إرسال إجاباتك بنجاح!</h2>
      <div id="result-card-display" class="mb-6">
        <p class="text-lg text-slate-600">مجموع النقاط: <span id="res-total-score" class="font-extrabold text-blue-600 text-2xl"></span></p>
        <p class="text-xl mt-2">المستوى: <span id="res-level-label" class="font-bold px-3 py-1 rounded-full text-white"></span></p>
        <p id="res-recommendation" class="text-slate-500 mt-4 bg-slate-50 p-4 rounded-lg"></p>
      </div>
      <button id="btn-download-card" class="bg-green-500 text-white px-6 py-2 rounded-lg hover:bg-green-600 transition">
        <i class="fas fa-download ml-2"></i>تحميل بطاقة النتيجة
      </button>
      <a href="index.html" class="block mt-4 text-blue-600 hover:underline text-sm">العودة للرئيسية</a>
    </div>

  </div>

  <!-- بطاقة المشاركة المخفية (تستخدم لالتقاط الصورة فقط) -->
  <div id="share-card-capture" class="share-card">
    <h2 style="font-family: var(--font-heading); font-size: 2rem; margin-bottom: 1rem;">تبصرة</h2>
    <p id="sc-form-title" style="font-size: 1.2rem; margin-bottom: 1.5rem;"></p>
    <p style="font-size: 3rem; font-weight: 800; margin-bottom: 0.5rem;" id="sc-score"></p>
    <div style="display: inline-block; padding: 0.5rem 1.5rem; border-radius: 9999px; font-weight: bold; margin-bottom: 1rem;" id="sc-level-badge"></div>
    <p style="font-size: 1rem; opacity: 0.9;" id="sc-name"></p>
  </div>

  <!-- سكربت عرض الاستمارة -->
  <script type="module" src="js/form_renderer.js"></script>
</body>
</html>
