<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تبصرة — نظام الاستمارات الذكي</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md mx-auto p-4">
    <!-- الشعار والعنوان -->
    <div class="text-center mb-8">
      <i class="fas fa-brain text-blue-600 text-5xl mb-3"></i>
      <h1 class="text-4xl font-extrabold text-slate-800" style="font-family: var(--font-heading);">تبصرة</h1>
      <p class="text-slate-500 mt-2">نظام الاستمارات الذكي والتقييم المخفي</p>
    </div>

    <!-- بطاقة المصادقة -->
    <div class="card">
      <div id="login-section">
        <h2 class="text-2xl font-bold text-center mb-6">تسجيل الدخول</h2>
        
        <!-- حقول البريد والرقم السري (للمشرفين/المرشدين) -->
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-1 text-slate-600">البريد الإلكتروني</label>
          <input type="email" id="email-input" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:border-blue-500" placeholder="example@domain.com">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-semibold mb-1 text-slate-600">كلمة المرور</label>
          <input type="password" id="password-input" class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:border-blue-500" placeholder="••••••••">
        </div>

        <button id="btn-email-login" class="btn-primary w-full mb-3">
          <i class="fas fa-sign-in-alt ml-2"></i>دخول بالبريد الإلكتروني
        </button>

        <div class="relative my-4">
          <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-200"></div></div>
          <div class="relative flex justify-center text-sm"><span class="bg-white px-2 text-slate-400">أو المتابعة عبر</span></div>
        </div>

        <!-- أزرار تسجيل الدخول الأخرى -->
        <button id="btn-google-login" class="w-full bg-white border border-slate-300 text-slate-700 font-semibold py-2 rounded-lg hover:bg-slate-50 transition mb-2">
          <i class="fab fa-google ml-2 text-red-500"></i>حساب جوجل
        </button>
        
        <button id="btn-guest-login" class="w-full bg-slate-100 text-slate-600 font-semibold py-2 rounded-lg hover:bg-slate-200 transition">
          <i class="fas fa-user-secret ml-2"></i>متابعة كضيف
        </button>

        <!-- رسائل الخطأ -->
        <div id="error-message" class="mt-4 text-red-500 text-sm text-center hidden"></div>
      </div>
    </div>
    
    <!-- فوتر -->
    <p class="text-center text-xs text-slate-400 mt-6">تبصرة &copy; 2024 - جميع الحقوق محفوظة</p>
  </div>

  <!-- Bootstraping App -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
